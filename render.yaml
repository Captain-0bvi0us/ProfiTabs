databases:
  - name: profitabs-db
    plan: free
    databaseName: profitabs
    user: profitabs

services:
  - type: web
    name: profitabs
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn profitabs.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: profitabs-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: NODE_VERSION
        value: "20"
